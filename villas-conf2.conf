nodes = {
    signal_node = {
        type = "signal.v2"

        rate = 1000.0

        # Wait between emitting each sample
        realtime = true

        # Only emit 1000 samples, then stop
        limit = 1000

        in = {
            signals = (
                { name = "sine1" signal = "sine" amplitude = 100.0 frequency = 50 offset = 1.0 }
            )
        }
    }
    file_node = {
        type = "file"
        uri = "input.log"
        format = "csv"

        out = {
            # Flush or upload contents of the file every time new samples are sent
            flush = false

            # Creates a stream buffer if value is positive
            buffer_size = 0
        }
    }
}

paths = (
    {
        in = "signal_node"
        out = "file_node"
        hooks = (
            {
                type = "dp"

                signal = "sine1"
                f0 = 50 # In Hz
                dt = 0.001 # In seconds

                # Alternative to dt
                # rate = 10 Hz

                harmonics = [ 0, 1, 3, 5, 7 ]
                inverse = false
            },
            {
                type = "print"
                format = "villas.human"
                prefix = "[file node ]"
            }
        )
    }
) 
