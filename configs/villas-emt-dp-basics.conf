# VILLAS bridge for the mixed EMT to DP basic co-simulation examples
# (dpsim-villas/examples/cxx/cosim/basics, EMTDP_* and DPEMT_* pairs).
#
# The EMT side exchanges three phase quantities; the DP side exchanges phasors.
# The bridge demodulates the EMT phase-A signal into one phasor for the DP side,
# and remodulates the DP side's three (fanned) phasors back into three EMT phase
# carriers. The signal names here are positional labels, so this one bridge
# serves every EMT to DP case (both ITM assignments and both leader directions):
# whether a channel physically carries voltage or current is decided by the two
# DPsim processes, not by this file.
#
# f0 = 50 with dt = 1e-4 gives an integer (1/50)/1e-4 = 200-sample demodulation
# window. Keep dt equal to the -o timestep the DPsim processes use.

nodes = {
    emt_node = {
        type = "shmem"
        mode = "polling"
        in = {
            name = "/dpsim.emt-to-bridge"
            signals = (
                { name = "seq_self_emt",     type = "integer" },
                { name = "seq_external_emt", type = "integer" },
                { name = "pa_emt", type = "float" },
                { name = "pb_emt", type = "float" },
                { name = "pc_emt", type = "float" }
            )
        }
        out = {
            name = "/dpsim.bridge-to-emt"
            signals = (
                { name = "seq_self_emt",     type = "integer" },
                { name = "seq_external_emt", type = "integer" },
                { name = "pa_emt", type = "float" },
                { name = "pb_emt", type = "float" },
                { name = "pc_emt", type = "float" }
            )
        }
    }

    dp_node = {
        type = "shmem"
        mode = "polling"
        in = {
            name = "/dpsim.dp-to-bridge"
            signals = (
                { name = "seq_self_dp",     type = "integer" },
                { name = "seq_external_dp", type = "integer" },
                { name = "pa_dp", type = "complex" },
                { name = "pb_dp", type = "complex" },
                { name = "pc_dp", type = "complex" }
            )
        }
        out = {
            name = "/dpsim.bridge-to-dp"
            signals = (
                { name = "seq_self_dp",     type = "integer" },
                { name = "seq_external_dp", type = "integer" },
                { name = "pa_dp", type = "complex" }
            )
        }
    }
}

paths = (
    {
        # EMT -> DP: demodulate the EMT phase-A carrier into one phasor.
        in = [
            "emt_node.seq_self_emt",
            "emt_node.seq_external_emt",
            "emt_node.pa_emt"
        ]
        out = "dp_node"
        hooks = (
            { type = "dp", signal = "pa_emt", f0 = 50, dt = 0.0001, harmonics = [ 1 ], inverse = false }
        )
    },
    {
        # DP -> EMT: remodulate the three DP phasors into three EMT phases.
        in = [
            "dp_node.seq_self_dp",
            "dp_node.seq_external_dp",
            "dp_node.pa_dp",
            "dp_node.pb_dp",
            "dp_node.pc_dp"
        ]
        out = "emt_node"
        hooks = (
            { type = "dp", signal = "pa_dp", f0 = 50, dt = 0.0001, harmonics = [ 1 ], inverse = true },
            { type = "dp", signal = "pb_dp", f0 = 50, dt = 0.0001, harmonics = [ 1 ], inverse = true },
            { type = "dp", signal = "pc_dp", f0 = 50, dt = 0.0001, harmonics = [ 1 ], inverse = true }
        )
    }
)
