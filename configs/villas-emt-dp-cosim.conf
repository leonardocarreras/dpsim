nodes = {
    dp_side = {
        type = "shmem"

        # Incoming DP-side voltage data.
        in = {
            name = "/dpsim.dp-follower-to-bridge"
            signals = (
                { name = "seq_from_self_dp", type = "integer" },
                { name = "seq_from_external_dp", type = "integer" },
                { name = "VA_dp", type = "complex", unit = "V" },
                { name = "VB_dp", type = "complex", unit = "V" },
                { name = "VC_dp", type = "complex", unit = "V" }
            )
        }

        # Outgoing EMT-side voltage data.
        out = {
            name = "/dpsim.leader-to-follower"
            signals = (
                { name = "seq_to_self_emt", type = "integer" },
                { name = "seq_to_external_emt", type = "integer" },
                { name = "VA_emt", type = "float", unit = "V" },
                { name = "VB_emt", type = "float", unit = "V" },
                { name = "VC_emt", type = "float", unit = "V" }
            )
        }
    },
    emt_side = {
        type = "shmem"

        # Incoming EMT-side current data.
        in = {
            name = "/dpsim.follower-to-leader"
            signals = (
                { name = "seq_from_self_emt", type = "integer" },
                { name = "seq_from_external_emt", type = "integer" },
                { name = "IA_emt", type = "float", unit = "A" },
                { name = "IB_emt", type = "float", unit = "A" },
                { name = "IC_emt", type = "float", unit = "A" }
            )
        }

        # Outgoing DP-side current data.
        out = {
            name = "/dpsim.bridge-to-dp-follower"
            signals = (
                { name = "seq_to_self_dp", type = "integer" },
                { name = "seq_to_external_dp", type = "integer" },
                { name = "IA_dp", type = "complex", unit = "A" }
            )
        }
    }
}

