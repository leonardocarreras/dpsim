# VILLAS bridge for the WSCC 9-bus SFA<->EMT (DP<->EMT) co-simulation.
#
# It connects two DPsim processes through shared memory and converts between
# their signal representations with the "dp" hook:
#   EMT leader  <-- 3-phase instantaneous currents / voltages -->  bridge
#   DP follower <-- single-phase dynamic phasors            -->  bridge
#
# Frequency note: the "dp" hooks demodulate/remodulate at f0 with timestep dt.
# With dt = 5e-5 and f0 = 50, the window (1/50)/5e-5 = 400 samples is an exact
# period, so there is no spectral-bin drift. The 9-bus scenario itself runs at
# 60 Hz, so f0 here does NOT track the system frequency; this is a known
# limitation kept so the bridge reproduces the validated baseline. The
# frequency-correct fix is to demodulate/remodulate at the true system frequency
# decoupled from the window length (a proper resample chain), not to re-pair dt
# to f0. Keep dt in sync with the -o timestep the DPsim processes use.

nodes = {
    # Full-duplex connection to the EMT leader process.
    emt_node = {
        type = "shmem"
        mode = "polling"

        # EMT leader writes currents here; VILLAS reads them.
        in = {
            name = "/dpsim.follower-to-leader"
            signals = (
                { name = "seq_from_self_emt",     type = "integer" },
                { name = "seq_from_external_emt", type = "integer" },
                { name = "IA_emt", type = "float", unit = "A" },
                { name = "IB_emt", type = "float", unit = "A" },
                { name = "IC_emt", type = "float", unit = "A" }
            )
        }

        # VILLAS writes reconstructed EMT voltages here; EMT leader reads them.
        out = {
            name = "/dpsim.leader-to-follower"
            signals = (
                { name = "seq_to_self_emt",     type = "integer" },
                { name = "seq_to_external_emt", type = "integer" },
                { name = "VA_emt", type = "float", unit = "V" },
                { name = "VB_emt", type = "float", unit = "V" },
                { name = "VC_emt", type = "float", unit = "V" }
            )
        }
    }

    # Full-duplex connection to the DP follower process.
    dp_node = {
        type = "shmem"
        mode = "polling"

        # DP follower writes voltage phasors here; VILLAS reads them.
        in = {
            name = "/dpsim.dp-follower-to-bridge"
            signals = (
                { name = "seq_from_self_dp",     type = "integer" },
                { name = "seq_from_external_dp", type = "integer" },
                { name = "VA_dp", type = "complex", unit = "V" },
                { name = "VB_dp", type = "complex", unit = "V" },
                { name = "VC_dp", type = "complex", unit = "V" }
            )
        }

        # VILLAS writes the DP current phasor here; DP follower reads it.
        out = {
            name = "/dpsim.bridge-to-dp-follower"
            signals = (
                { name = "seq_to_self_dp",     type = "integer" },
                { name = "seq_to_external_dp", type = "integer" },
                { name = "IA_dp", type = "complex", unit = "A" }
            )
        }
    }
}

paths = (
    {
        # EMT -> DP: read currents from the EMT leader, demodulate to a phasor,
        # send to the DP follower.
        in = [
            "emt_node.seq_from_self_emt",
            "emt_node.seq_from_external_emt",
            "emt_node.IA_emt"
        ]
        out = "dp_node"
        hooks = (
            {
                type      = "dp"
                signal    = "IA_emt"
                f0        = 50
                dt        = 0.00005
                harmonics = [ 1 ]
                inverse   = false
            }
        )
    },

    {
        # DP -> EMT: read voltage phasors from the DP follower, reconstruct the
        # carrier, send to the EMT leader.
        in = [
            "dp_node.seq_from_self_dp",
            "dp_node.seq_from_external_dp",
            "dp_node.VA_dp",
            "dp_node.VB_dp",
            "dp_node.VC_dp"
        ]
        out = "emt_node"
        hooks = (
            {
                type      = "dp"
                signal    = "VA_dp"
                f0        = 50
                dt        = 0.00005
                harmonics = [ 1 ]
                inverse   = true
            },
            {
                type      = "dp"
                signal    = "VB_dp"
                f0        = 50
                dt        = 0.00005
                harmonics = [ 1 ]
                inverse   = true
            },
            {
                type      = "dp"
                signal    = "VC_dp"
                f0        = 50
                dt        = 0.00005
                harmonics = [ 1 ]
                inverse   = true
            }
        )
    }
)
